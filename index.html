<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary-blue: #007bff;
      --light-blue: #e3f2fd;
      --dark-blue: #0056b3;
    }

    body {
      font-family: 'Noto Sans KR', sans-serif;
      background-color: var(--light-blue);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .container {
      background: white;
      padding: 30px;
      border-radius: 15px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
      width: 100%;
      max-width: 400px;
      text-align: center;
    }

    h2 { color: var(--dark-blue); margin-bottom: 25px; }

    input, select, textarea {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border: 1px solid #ddd;
      border-radius: 8px;
      box-sizing: border-box;
      font-size: 14px;
    }

    button {
      background-color: var(--primary-blue);
      color: white;
      border: none;
      padding: 15px;
      border-radius: 8px;
      cursor: pointer;
      width: 100%;
      font-size: 16px;
      font-weight: bold;
      transition: background 0.3s;
    }

    button:hover { background-color: var(--dark-blue); }

    .loading { display: none; color: var(--primary-blue); margin-top: 10px; }
  </style>
</head>
<body>

<div class="container" id="mainForm">
  <h2>💙 마음 기록장</h2>
  
  <input type="text" id="studentName" placeholder="이름을 입력하세요" required>
  
  <select id="emotion">
    <option value="" disabled selected>오늘 기분은 어떤가요?</option>
    <option value="행복함">행복함 😊</option>
    <option value="평온함">평온함 🌿</option>
    <option value="슬픔">슬픔 💧</option>
    <option value="화남">화남 🔥</option>
    <option value="걱정됨">걱정됨 💭</option>
  </select>

  <button onclick="handleEmotionSubmit()">기록하기</button>
  <div id="loader" class="loading">정보를 시트에 저장 중...</div>
</div>

<script>
  function handleEmotionSubmit() {
    const name = document.getElementById('studentName').value;
    const emotion = document.getElementById('emotion').value;

    if (!name || !emotion) {
      alert("이름과 감정을 모두 선택해주세요!");
      return;
    }

    // 팝업 질문 (confirm 대신 간단한 prompt 활용)
    const reason = prompt(`"${emotion}" 감정을 느끼셨군요!\n오늘 어떤 일이 있었는지 선생님께 들려줄래요?`);

    if (reason !== null && reason.trim() !== "") {
      submitToSheet(name, emotion, reason);
    } else {
      alert("이유를 입력해야 기록이 완료됩니다.");
    }
  }

  function submitToSheet(name, emotion, reason) {
    document.getElementById('loader').style.display = 'block';
    
    google.script.run
      .withSuccessHandler(function(response) {
        document.getElementById('loader').style.display = 'none';
        alert("기록 완료!\n\n[선생님의 피드백]\n" + response.feedback);
        // 입력창 초기화
        document.getElementById('emotion').value = "";
      })
      .withFailureHandler(function(err) {
        alert("오류가 발생했습니다: " + err);
      })
      .submitData(name, emotion, reason);
  }
</script>

</body>
</html>
