<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>마음 날씨 기록장</title>
  <!-- Tailwind CSS 로드 -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Noto Sans KR 폰트 로드 -->
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    body { 
      font-family: 'Noto Sans KR', sans-serif; 
    }
    /* 모달이 떴을 때 배경 스크롤 방지 */
    .modal-active { 
      overflow: hidden; 
    }
    /* 로딩 애니메이션 */
    .loader {
      border: 4px solid #e0f2fe;
      border-top: 4px solid #3b82f6;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body class="bg-sky-50 min-h-screen flex items-center justify-center p-4">

  <!-- [화면 1] 메인 입력 카드 -->
  <div id="mainCard" class="bg-white p-8 rounded-2xl shadow-lg w-full max-w-md border-t-4 border-sky-400 transition-all">
    <h1 class="text-2xl font-bold text-sky-800 mb-2 text-center">☁️ 오늘의 마음 날씨</h1>
    <p class="text-sky-600 text-center mb-6 text-sm">지금 느끼는 감정을 솔직하게 기록해 보세요.</p>
    
    <div class="mb-5">
      <label class="block text-sky-800 font-medium mb-2 text-sm">내 이름</label>
      <input type="text" id="studentName" class="w-full px-4 py-3 rounded-xl border border-sky-100 bg-sky-50/50 focus:bg-white focus:outline-none focus:ring-2 focus:ring-sky-400 transition" placeholder="이름을 입력하세요">
    </div>
    
    <div class="mb-8">
      <label class="block text-sky-800 font-medium mb-2 text-sm">오늘의 감정 키워드</label>
      <input type="text" id="emotions" class="w-full px-4 py-3 rounded-xl border border-sky-100 bg-sky-50/50 focus:bg-white focus:outline-none focus:ring-2 focus:ring-sky-400 transition" placeholder="예: 기쁨, 뿌듯함, 속상함, 기대됨">
    </div>
    
    <button onclick="openReasonModal()" class="w-full bg-sky-500 hover:bg-sky-600 text-white font-bold py-3.5 px-4 rounded-xl shadow-md hover:shadow-lg transition-all transform hover:-translate-y-0.5">
      다음으로 이동
    </button>
  </div>

  <!-- [화면 2] 이유를 묻는 팝업(모달) -->
  <div id="reasonModal" class="fixed inset-0 bg-sky-900 bg-opacity-40 hidden flex items-center justify-center p-4 z-50 backdrop-blur-sm transition-opacity">
    <div class="bg-white p-8 rounded-2xl shadow-2xl w-full max-w-md transform transition-all">
      <h2 class="text-xl font-bold text-sky-800 mb-2">💬 무슨 일이 있었나요?</h2>
      <p class="text-sky-600 text-sm mb-5">
        <span id="displayEmotion" class="font-bold text-sky-700 bg-sky-100 px-2 py-0.5 rounded"></span> 감정을 느낀 이유를 들려주세요.
      </p>
      
      <textarea id="reason" rows="5" class="w-full px-4 py-3 rounded-xl border border-sky-100 bg-sky-50/50 focus:bg-white focus:outline-none focus:ring-2 focus:ring-sky-400 transition resize-none mb-6" placeholder="여기에 마음속 이야기를 편하게 적어주세요..."></textarea>
      
      <div class="flex space-x-3">
        <button onclick="closeReasonModal()" class="flex-1 bg-gray-100 hover:bg-gray-200 text-gray-700 font-medium py-3 px-4 rounded-xl transition">취소</button>
        <button onclick="submitData()" class="flex-1 bg-sky-500 hover:bg-sky-600 text-white font-bold py-3 px-4 rounded-xl shadow-md transition">기록 완료하기</button>
      </div>
    </div>
  </div>

  <!-- [화면 3] 로딩 화면 -->
  <div id="loadingCard" class="bg-white p-10 rounded-2xl shadow-lg w-full max-w-md text-center hidden flex-col items-center justify-center space-y-4 border-t-4 border-sky-400">
    <div class="loader mx-auto"></div>
    <p class="text-sky-800 font-medium">선생님이 메시지를 읽고 있어요...<br><span class="text-sm text-sky-500 font-normal">따뜻한 답장을 준비 중입니다.</span></p>
  </div>

  <!-- [화면 4] 완료 및 피드백 화면 -->
  <div id="resultCard" class="bg-white p-8 rounded-2xl shadow-lg w-full max-w-md border-t-4 border-sky-400 hidden">
    <div class="text-center mb-6">
      <div class="w-16 h-16 bg-sky-100 rounded-full flex items-center justify-center mx-auto mb-4">
        <span class="text-3xl">💌</span>
      </div>
      <h2 class="text-xl font-bold text-sky-800">기록이 완료되었어요!</h2>
    </div>
    
    <div class="bg-sky-50 p-5 rounded-xl mb-8 border border-sky-100">
      <p class="text-xs text-sky-600 font-bold mb-2">선생님의 답장</p>
      <p id="feedbackText" class="text-sky-900 text-sm leading-relaxed"></p>
    </div>
    
    <button onclick="resetForm()" class="w-full bg-sky-500 hover:bg-sky-600 text-white font-bold py-3.5 px-4 rounded-xl shadow-md transition">
      처음으로 돌아가기
    </button>
  </div>

  <script>
    // 모달 열기
    function openReasonModal() {
      const name = document.getElementById('studentName').value.trim();
      const emotions = document.getElementById('emotions').value.trim();

      if (!name || !emotions) {
        alert('이름과 오늘 느낀 감정을 모두 입력해주세요! 😊');
        return;
      }

      document.getElementById('displayEmotion').innerText = emotions;
      document.getElementById('reasonModal').classList.remove('hidden');
      document.body.classList.add('modal-active');
    }

    // 모달 닫기
    function closeReasonModal() {
      document.getElementById('reasonModal').classList.add('hidden');
      document.body.classList.remove('modal-active');
    }

    // 데이터 제출 및 구글 시트 전송
    function submitData() {
      const name = document.getElementById('studentName').value.trim();
      const emotions = document.getElementById('emotions').value.trim();
      const reason = document.getElementById('reason').value.trim();

      if (!reason) {
        alert('어떤 일이 있었는지 이유를 조금만 들려주세요! 🥺');
        return;
      }

      // 1. 모달 닫기 & 메인 화면 숨기기
      closeReasonModal();
      document.getElementById('mainCard').classList.add('hidden');
      
      // 2. 로딩 화면 표시
      document.getElementById('loadingCard').classList.remove('hidden');
      document.getElementById('loadingCard').classList.add('flex');

      // 3. 구글 Apps Script로 데이터 전송 (백엔드 함수 호출)
      google.script.run
        .withSuccessHandler(showFeedback)
        .withFailureHandler(showError)
        .saveEmotionData(name, emotions, reason);
    }

    // 통신 성공 시 피드백 보여주기
    function showFeedback(response) {
      document.getElementById('loadingCard').classList.add('hidden');
      document.getElementById('loadingCard').classList.remove('flex');
      
      if (response.success) {
        document.getElementById('feedbackText').innerText = response.feedback;
        document.getElementById('resultCard').classList.remove('hidden');
      } else {
        showError(response.error);
      }
    }

    // 통신 에러 발생 시
    function showError(error) {
      document.getElementById('loadingCard').classList.add('hidden');
      document.getElementById('loadingCard').classList.remove('flex');
      
      alert('오류가 발생했습니다. 기록이 저장되지 않았을 수 있습니다.\n' + error);
      document.getElementById('mainCard').classList.remove('hidden');
    }

    // 폼 초기화 (처음으로)
    function resetForm() {
      document.getElementById('studentName').value = '';
      document.getElementById('emotions').value = '';
      document.getElementById('reason').value = '';
      
      document.getElementById('resultCard').classList.add('hidden');
      document.getElementById('mainCard').classList.remove('hidden');
    }
  </script>
</body>
</html>
