<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary-blue: #0077b6;
      --secondary-blue: #00b4d8;
      --light-blue: #caf0f8;
      --bg-color: #f8f9fa;
      --white: #ffffff;
    }

    body {
      font-family: 'Noto Sans KR', sans-serif;
      background-color: var(--light-blue);
      margin: 0;
      padding: 20px;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .app-container {
      background: var(--white);
      width: 100%;
      max-width: 480px;
      border-radius: 24px;
      box-shadow: 0 10px 30px rgba(0, 119, 182, 0.15);
      padding: 35px;
      box-sizing: border-box;
      position: relative;
    }

    .header {
      text-align: center;
      margin-bottom: 35px;
    }

    .header h1 {
      color: var(--primary-blue);
      margin: 0;
      font-size: 28px;
      font-weight: 700;
    }

    .header p {
      color: #555;
      font-size: 15px;
      margin-top: 8px;
    }

    .input-section {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .field-label {
      font-weight: 700;
      color: var(--primary-blue);
      margin-bottom: 8px;
      display: block;
      font-size: 15px;
    }

    input[type="text"], select, textarea {
      width: 100%;
      padding: 14px 16px;
      border: 2px solid #e1e8ed;
      border-radius: 12px;
      font-size: 16px;
      font-family: inherit;
      box-sizing: border-box;
      transition: all 0.3s;
    }

    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: var(--secondary-blue);
      background-color: #fcfdfe;
    }

    #reasonSection, #resultSection {
      display: none;
      margin-top: 20px;
      padding-top: 20px;
      border-top: 1px dashed #e1e8ed;
      animation: fadeIn 0.5s ease-out forwards;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    button {
      background: var(--primary-blue);
      color: white;
      border: none;
      padding: 18px;
      border-radius: 14px;
      font-size: 18px;
      font-weight: 700;
      cursor: pointer;
      width: 100%;
      transition: all 0.3s;
      margin-top: 10px;
      box-shadow: 0 4px 12px rgba(0, 119, 182, 0.2);
    }

    button:hover {
      background: #023e8a;
      transform: translateY(-2px);
    }

    .feedback-card {
      background: #f0faff;
      border-left: 6px solid var(--secondary-blue);
      padding: 24px;
      border-radius: 16px;
      margin-top: 20px;
      line-height: 1.8;
      color: #333;
      font-size: 16px;
      white-space: pre-wrap;
    }

    .loader {
      display: none;
      text-align: center;
      margin: 30px 0;
    }

    .spinner {
      width: 44px;
      height: 44px;
      border: 4px solid #f3f3f3;
      border-top: 4px solid var(--primary-blue);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      display: inline-block;
    }

    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div class="app-container">
  <div class="header">
    <h1>💙 AI 마음 기록장</h1>
    <p>오늘 나의 이야기를 들려주세요</p>
  </div>

  <div id="mainContent">
    <div id="step1" class="input-section">
      <div>
        <label class="field-label">이름</label>
        <input type="text" id="studentName" placeholder="성함을 입력해주세요">
      </div>
      <div>
        <label class="field-label">지금 기분은 어떤가요?</label>
        <select id="emotionSelect" onchange="checkEmotionSelection()">
          <option value="" disabled selected>감정 키워드를 선택하세요</option>
          <option value="행복함">행복함 😊</option>
          <option value="평온함">평온함 🌿</option>
          <option value="걱정됨">걱정됨 😟</option>
          <option value="슬픔">슬픔 😢</option>
          <option value="화남">화남 😡</option>
          <option value="뿌듯함">뿌듯함 ✨</option>
          <option value="피곤함">피곤함 😴</option>
        </select>
      </div>
    </div>

    <div id="reasonSection">
      <div class="input-section">
        <div>
          <label class="field-label" id="reasonLabel">무슨 일이 있었나요?</label>
          <textarea id="reasonText" rows="4" placeholder="선생님께 마음속 이야기를 들려주세요."></textarea>
        </div>
        <button onclick="handleFinalSubmit()">기록하고 선생님 답장 확인하기</button>
      </div>
    </div>
  </div>

  <div id="loader" class="loader">
    <div class="spinner"></div>
    <p style="margin-top:15px; color:var(--primary-blue); font-weight:500;">
      AI 선생님이 내용을 읽고<br>따뜻한 답장을 쓰고 있어요...
    </p>
  </div>

  <div id="resultSection">
    <label class="field-label" style="font-size:18px;">💌 AI 선생님의 따뜻한 답장</label>
    <div class="feedback-card" id="feedbackContent"></div>
    <button onclick="location.reload()" style="margin-top: 25px; background: #78909c;">새로 작성하기</button>
  </div>
</div>

<script>
  function checkEmotionSelection() {
    const emotion = document.getElementById('emotionSelect').value;
    const name = document.getElementById('studentName').value;
    if (!name) {
      alert("이름을 먼저 입력해주셔야 기분을 물어볼 수 있어요!");
      document.getElementById('emotionSelect').value = "";
      return;
    }
    if (emotion) {
      document.getElementById('reasonLabel').innerText = `"${emotion}" 감정을 느끼셨군요! 오늘 어떤 일이 있었나요?`;
      document.getElementById('reasonSection').style.display = 'block';
    }
  }

  function handleFinalSubmit() {
    const name = document.getElementById('studentName').value;
    const emotion = document.getElementById('emotionSelect').value;
    const reason = document.getElementById('reasonText').value;

    if (!reason.trim()) {
      alert("이야기를 들려주셔야 선생님이 답장을 보낼 수 있어요.");
      return;
    }

    document.getElementById('mainContent').style.display = "none";
    document.getElementById('loader').style.display = "block";

    const data = { name, emotion, reason };

    if (typeof google !== 'undefined' && google.script && google.script.run) {
      google.script.run
        .withSuccessHandler(function(response) {
          showFeedback(response);
        })
        .withFailureHandler(function(err) {
          alert("오류: " + err);
          document.getElementById('loader').style.display = "none";
          document.getElementById('mainContent').style.display = "block";
        })
        .saveToSpecificSheet(data);
    } else {
      setTimeout(() => {
        showFeedback({
          success: true, 
          feedback: "테스트 모드입니다. AI 선생님이 작성한 3문장의 따뜻한 피드백이 이곳에 표시될 예정입니다."
        });
      }, 1500);
    }
  }

  function showFeedback(response) {
    document.getElementById('loader').style.display = "none";
    if (response.success) {
      document.getElementById('feedbackContent').innerText = response.feedback;
      document.getElementById('resultSection').style.display = "block";
    } else {
      alert(response.message);
      document.getElementById('mainContent').style.display = "block";
    }
  }
</script>

</body>
</html>
