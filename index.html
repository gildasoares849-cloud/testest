<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>냉철한 AI 면접관</title>
  <!-- Tailwind CSS 로드 -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Noto Sans KR 폰트 로드 -->
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
  <style>
    body { 
      font-family: 'Noto Sans KR', sans-serif; 
    }
    /* 차가운 느낌의 로딩 애니메이션 */
    .loader {
      border: 4px solid #334155;
      border-top: 4px solid #94a3b8;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    /* 스크롤바 커스텀 */
    .custom-scrollbar::-webkit-scrollbar {
      width: 6px;
    }
    .custom-scrollbar::-webkit-scrollbar-track {
      background: #f1f5f9; 
    }
    .custom-scrollbar::-webkit-scrollbar-thumb {
      background: #cbd5e1; 
      border-radius: 4px;
    }
  </style>
</head>
<body class="bg-slate-900 min-h-screen flex items-center justify-center p-4">

  <!-- [화면 1] 메인 입력 카드 -->
  <div id="mainCard" class="bg-slate-50 p-8 rounded-xl shadow-2xl w-full max-w-lg border-t-8 border-slate-700 transition-all">
    <div class="flex items-center justify-center mb-4">
      <svg class="w-8 h-8 text-slate-700 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 13.255A23.931 23.931 0 0112 15c-3.183 0-6.22-.62-9-1.745M16 6V4a2 2 0 00-2-2h-4a2 2 0 00-2 2v2m4 6h.01M5 20h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>
      <h1 class="text-2xl font-black text-slate-800 tracking-tight">AI 면접관의 압박 질문</h1>
    </div>
    <p class="text-slate-500 text-center mb-8 text-sm">회사와 직무에 맞춘 날카로운 질문 10개를 추출합니다.</p>
    
    <div class="space-y-5 mb-8">
      <div>
        <label class="block text-slate-700 font-bold mb-2 text-sm">회사명</label>
        <input type="text" id="company" class="w-full px-4 py-3 rounded-lg border border-slate-300 bg-white focus:outline-none focus:ring-2 focus:ring-slate-500 transition shadow-sm" placeholder="예: 구글 코리아">
      </div>
      
      <div>
        <label class="block text-slate-700 font-bold mb-2 text-sm">지원 직무</label>
        <input type="text" id="job" class="w-full px-4 py-3 rounded-lg border border-slate-300 bg-white focus:outline-none focus:ring-2 focus:ring-slate-500 transition shadow-sm" placeholder="예: 프론트엔드 개발자">
      </div>

      <div>
        <label class="block text-slate-700 font-bold mb-2 text-sm">해당 기업의 인재상</label>
        <textarea id="talent" rows="3" class="w-full px-4 py-3 rounded-lg border border-slate-300 bg-white focus:outline-none focus:ring-2 focus:ring-slate-500 transition shadow-sm resize-none custom-scrollbar" placeholder="예: 혁신을 주도하고 협업을 중시하는 인재"></textarea>
      </div>
    </div>
    
    <!-- 에러 메시지 표시 영역 -->
    <p id="errorMsg" class="text-red-500 text-sm font-bold text-center mb-4 hidden">모든 항목을 입력해야 질문을 분석할 수 있습니다.</p>

    <button onclick="submitData()" class="w-full bg-slate-800 hover:bg-slate-900 text-white font-bold py-4 px-4 rounded-lg shadow-md transition-all">
      예상 질문 추출하기
    </button>
  </div>

  <!-- [화면 2] 로딩 화면 -->
  <div id="loadingCard" class="bg-slate-50 p-10 rounded-xl shadow-2xl w-full max-w-lg text-center hidden flex-col items-center justify-center space-y-6 border-t-8 border-slate-700">
    <div class="loader mx-auto"></div>
    <div>
      <p class="text-slate-800 font-bold text-lg mb-1">면접관이 이력서와 기업 정보를 분석 중입니다.</p>
      <p class="text-sm text-slate-500">날카로운 질문을 생성하고 있습니다. 잠시만 기다려주세요.</p>
    </div>
  </div>

  <!-- [화면 3] 완료 및 결과 화면 -->
  <div id="resultCard" class="bg-slate-50 p-8 rounded-xl shadow-2xl w-full max-w-lg border-t-8 border-slate-700 hidden flex-col h-[80vh]">
    <div class="flex items-center justify-between mb-4 pb-4 border-b border-slate-200 shrink-0">
      <h2 class="text-xl font-black text-slate-800">예상 면접 질문 10선</h2>
      <span class="bg-slate-200 text-slate-700 text-xs font-bold px-2 py-1 rounded">분석 완료</span>
    </div>
    
    <div class="bg-white p-5 rounded-lg border border-slate-200 overflow-y-auto custom-scrollbar flex-grow mb-6 shadow-inner">
      <p id="questionsText" class="text-slate-800 text-sm leading-relaxed whitespace-pre-line font-medium"></p>
    </div>
    
    <button onclick="resetForm()" class="w-full shrink-0 bg-slate-200 hover:bg-slate-300 text-slate-800 font-bold py-3.5 px-4 rounded-lg transition">
      새로운 조건으로 다시 추출
    </button>
  </div>

  <!-- [모달] 시스템 에러 발생 시 -->
  <div id="sysErrorModal" class="fixed inset-0 bg-black bg-opacity-60 hidden flex items-center justify-center p-4 z-50 transition-opacity">
    <div class="bg-white p-6 rounded-lg shadow-2xl w-full max-w-sm">
      <h3 class="text-lg font-bold text-red-600 mb-2">시스템 오류</h3>
      <p id="sysErrorText" class="text-slate-600 text-sm mb-6"></p>
      <button onclick="closeSysError()" class="w-full bg-slate-800 hover:bg-slate-900 text-white font-bold py-2 rounded-lg">확인</button>
    </div>
  </div>

  <script>
    // 데이터 제출 및 구글 시트 전송
    function submitData() {
      const company = document.getElementById('company').value.trim();
      const job = document.getElementById('job').value.trim();
      const talent = document.getElementById('talent').value.trim();

      if (!company || !job || !talent) {
        document.getElementById('errorMsg').classList.remove('hidden');
        return;
      }
      document.getElementById('errorMsg').classList.add('hidden');

      // 메인 화면 숨기기 & 로딩 화면 표시
      document.getElementById('mainCard').classList.add('hidden');
      document.getElementById('loadingCard').classList.remove('hidden');
      document.getElementById('loadingCard').classList.add('flex');

      // 구글 Apps Script로 데이터 전송 (백엔드 함수 호출)
      google.script.run
        .withSuccessHandler(showResult)
        .withFailureHandler(showSysError)
        .generateInterviewQuestions(company, talent, job);
    }

    // 통신 성공 시 결과 보여주기
    function showResult(response) {
      document.getElementById('loadingCard').classList.add('hidden');
      document.getElementById('loadingCard').classList.remove('flex');
      
      if (response.success) {
        document.getElementById('questionsText').innerText = response.questions;
        document.getElementById('resultCard').classList.remove('hidden');
        document.getElementById('resultCard').classList.add('flex');
      } else {
        showSysError(response.error);
      }
    }

    // 통신 에러 발생 시
    function showSysError(error) {
      document.getElementById('loadingCard').classList.add('hidden');
      document.getElementById('loadingCard').classList.remove('flex');
      
      document.getElementById('sysErrorText').innerText = '질문 추출 중 오류가 발생했습니다.\n' + error;
      document.getElementById('sysErrorModal').classList.remove('hidden');
    }

    function closeSysError() {
      document.getElementById('sysErrorModal').classList.add('hidden');
      document.getElementById('mainCard').classList.remove('hidden');
    }

    // 폼 초기화 (처음으로)
    function resetForm() {
      document.getElementById('company').value = '';
      document.getElementById('job').value = '';
      document.getElementById('talent').value = '';
      
      document.getElementById('resultCard').classList.add('hidden');
      document.getElementById('resultCard').classList.remove('flex');
      document.getElementById('mainCard').classList.remove('hidden');
    }
  </script>
</body>
</html>
